# =============================================================================
# SELENIUM BDD FRAMEWORK — CONFIGURATION FILE
# =============================================================================
# This file controls the runtime behaviour of the framework.
# No Java code needs to be modified to change any of these values.
#
# IMPORTANT: This file should NEVER contain passwords, secrets, or credentials.
# Sensitive data belongs in the encrypted test data JSON files only.
# =============================================================================


# =============================================================================
# BROWSER CONFIGURATION
# =============================================================================
# Specifies which browser WebDriver should launch for UI tests.
#
# Supported values:
#   chrome   — Google Chrome (most common, default)
#   firefox  — Mozilla Firefox
#   edge     — Microsoft Edge
#
# The DriverFactory class reads this value at runtime and initialises
# the appropriate WebDriver instance via WebDriverManager.
# =============================================================================
browser=chrome

# Run the browser in headless mode (no visible UI window).
# Headless is faster and required for CI/CD pipelines (GitHub Actions, Jenkins)
# where there is no display available.
#
# true  — headless mode (CI/CD, faster local runs)
# false — headed mode (local debugging, visual verification)
headless=false


# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================
# Defines which environment the framework runs against.
# The BaseURL for each environment is mapped in the DriverFactory/ConfigReader.
#
# Supported values:
#   dev     — local development environment
#   staging — pre-production staging environment
#   prod    — production environment (use with caution)
#
# For this portfolio project we are using public demo apps, so
# 'prod' effectively means the live demo site.
# =============================================================================
environment=prod

# =============================================================================
# APPLICATION URLs
# =============================================================================
# Base URLs for each target application used in this framework.
# These are referenced dynamically by the PageNavigator using the
# page name passed in from the feature file step.
#
# UI application — SauceDemo
# A purpose-built e-commerce demo app for test automation practice.
# =============================================================================
ui.base.url=https://www.saucedemo.com

# REST API application — ReqRes
# A hosted REST API that simulates real-world CRUD operations.
# Perfect for demonstrating REST Assured API test coverage.
api.base.url=https://reqres.in/api

# Secondary API — JSONPlaceholder
# A free fake REST API for additional API test coverage demonstration.
api.secondary.url=https://jsonplaceholder.typicode.com


# =============================================================================
# TIMEOUT CONFIGURATION
# =============================================================================
# All timeout values are in SECONDS.
#
# implicit.wait:
#   How long WebDriver polls the DOM for an element before throwing
#   NoSuchElementException. We keep this low because we rely on
#   explicit waits (ExpectedConditions) for reliability.
#   Best practice: set implicit wait low or zero when using explicit waits.
#
# explicit.wait:
#   How long ExpectedConditions will wait for a specific condition
#   (e.g. element visible, clickable) before throwing TimeoutException.
#   This is our primary waiting mechanism in the POMs.
#
# page.load.timeout:
#   Maximum time WebDriver will wait for a full page load to complete
#   before throwing a TimeoutException.
#
# script.timeout:
#   Maximum time WebDriver will wait for an async JavaScript execution
#   to complete (used when executing JS directly via JavascriptExecutor).
# =============================================================================
implicit.wait=0
explicit.wait=10
page.load.timeout=30
script.timeout=10


# =============================================================================
# TEST DATA CONFIGURATION
# =============================================================================
# Path to the encrypted JSON file containing test user credentials
# and any other sensitive test data.
#
# The path is relative to src/test/resources.
# JsonDataReader resolves this path at runtime using the ClassLoader,
# which means it works consistently regardless of the machine or
# CI/CD environment the framework runs on.
# =============================================================================
test.data.path=testdata/users.json

# The encryption algorithm used to encrypt and decrypt test data.
# AES (Advanced Encryption Standard) with a 128-bit key is used here.
# The actual encryption key is NEVER stored in this file — it is
# stored as an environment variable named: TEST_DATA_SECRET_KEY
# This keeps the key out of source control entirely.
encryption.algorithm=AES


# =============================================================================
# SCREENSHOT CONFIGURATION
# =============================================================================
# Controls automatic screenshot capture behaviour.
#
# screenshot.on.failure:
#   When true, the framework automatically takes a screenshot whenever
#   a test fails and attaches it to the Allure report. This is
#   invaluable for diagnosing failures in CI/CD pipelines where
#   you cannot see the browser directly.
#
# screenshot.path:
#   Directory where screenshots are saved, relative to the project root.
#   target/ is used because it is excluded from Git via .gitignore —
#   screenshots should never be committed to source control.
# =============================================================================
screenshot.on.failure=true
screenshot.path=target/screenshots


# =============================================================================
# ALLURE REPORTING
# =============================================================================
# Controls the Allure report output location.
# This should match the configuration in pom.xml under the
# Surefire plugin's systemPropertyVariables section.
# =============================================================================
allure.results.dir=target/allure-results


# =============================================================================
# LOGGING
# =============================================================================
# Log level for framework output during test execution.
#
# Supported values (in increasing verbosity):
#   ERROR — only critical failures
#   WARN  — warnings and errors
#   INFO  — general execution flow (recommended for CI)
#   DEBUG — detailed step-by-step output (recommended for local debugging)
# =============================================================================
log.level=INFO